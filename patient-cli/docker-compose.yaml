version: "3.9"
services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: patientdb
      MYSQL_USER: patientuser
      MYSQL_PASSWORD: patientpass
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: patient-cli
    depends_on:
      mysql:
        condition: service_healthy
    stdin_open: true
    tty: true
    environment:
      DB_URL: jdbc:mysql://mysql:3306/patientdb
      DB_USER: patientuser
      DB_PASSWORD: patientpass