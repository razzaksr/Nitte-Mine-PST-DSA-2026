name: Java Docker CI/CD

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Maven Project
        run: mvn clean package

      - name: Run Tests
        run: mvn test

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t razzaksr/patient-crud-app:${{ github.run_number }} .
          docker build -t razzaksr/patient-crud-app:latest .

      - name: Push Docker Image
        run: |
          docker push razzaksr/patient-crud-app:${{ github.run_number }}
          docker push razzaksr/patient-crud-app:latest